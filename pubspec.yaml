name: jup
description: 'Jugendapp für das Amt Süderbrarup'
publish_to: 'none'
version: 2.3.0
environment:
  sdk: ^3.9.0

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  auto_route: ^11.1.0
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.0
  http: ^1.1.0
  matomo_tracker: ^6.1.0
  markdown_widget: ^2.3.2+8
  package_info_plus: ^9.0.1

  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  video_player: ^2.9.2
  video_player_media_kit: ^2.0.0
  media_kit_libs_ios_video: any
  share_plus: ^10.1.3
  app_links: ^6.4.1
  cached_network_image: ^3.4.1
  video_thumbnail: ^0.5.3
  crypto: ^3.0.3
  connectivity_plus: ^7.1.1
  visibility_detector: ^0.4.0+2
  device_info_plus: ^12.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^17.0.0
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  auto_route_generator: ^10.2.4
  lean_builder: ^0.1.1
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/avatars/
    - assets/backgrounds/
    - assets/fonts/
    - assets/icons/
    - assets/banners/
    - assets/splash/

  fonts:
    - family: WorkSans
      fonts:
        - asset: assets/fonts/Work_Sans/static/WorkSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Work_Sans/static/WorkSans-Regular.ttf
          weight: 400

    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik/static/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rubik/static/Rubik-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icons/app_icon.png'

flutter_native_splash:
  # Purple background color matching Flutter splash screen
  color: '#9A7FFE'

  # White JUP logo (you need to provide this PNG file)
  image: assets/splash/logo_white.png

  # Branding image for older Android versions (optional - uses same logo if not specified)
  # branding: assets/splash/logo_white.png

  # Android 12+ specific configuration
  android_12:
    # Use the same purple background
    color: '#9A7FFE'
    # White logo for Android 12+
    image: assets/splash/logo_white.png
    # Branding image (optional)
    # branding: assets/splash/logo_white.png

  # Platform specific settings
  android: true
  ios: true
  web: false

  # Remove Flutter default white splash
  android_gravity: center
  ios_content_mode: center

  # Full screen (hide status bar during splash)
  fullscreen: true
